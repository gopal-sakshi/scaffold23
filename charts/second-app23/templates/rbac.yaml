apiVersion: v1
kind: ServiceAccount
metadata:
  name: service24-k8s-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: service24-k8s-reader-role
rules:
  - apiGroups: [""]                                         # The core API group
    resources: ["pods", "services", "endpoints", "namespaces", "configmaps", "nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]      # Read-only access
  - apiGroups: ["apps"]                                     # The apps group (for deployments)
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: service24-k8s-rbac-binding
subjects:
  - kind: ServiceAccount
    name: service24-k8s-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: service24-k8s-reader-role
  apiGroup: rbac.authorization.k8s.io