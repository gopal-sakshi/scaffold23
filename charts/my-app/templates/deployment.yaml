apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .Release.Name }}

spec:

  # replicas: 1
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.service.name }}
    
  template:
    metadata:
      labels:
        app: {{ .Values.service.name }}
    spec:
      containers:
        - name: webserver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag}}"
        #   env:
        #     - name: POD_IP23
        #       valueFrom:
        #         fieldRef:
        #           fieldPath: status.podIp
          ports:
            - containerPort: {{ .Values.service.targetPort24 }}